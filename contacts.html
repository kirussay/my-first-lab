<!DOCTYPE html>
<html lang="uk">
<head>
    <!-- Мета-теги для кодування, viewport, автора та опису -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Зв'яжіться зі мною через форму зворотного зв'язку">
    <meta name="author" content="kirussay">
    <meta name="keywords" content="Portfolio, HTML5, Lab1, Frontend">
    <link rel="stylesheet" href="styles.css">
    <title>Контакти — Портфоліо</title>
</head>
<body>
    <!-- Заголовок сторінки з навігацією -->
    <header>
        <h1>Зворотний зв'язок</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="about.html">Про мене</a></li>
                <li><a href="contacts.html">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <!-- Основний вміст сторінки -->
    <main>
        <!-- Стаття з формою зворотного зв'язку -->
        <article>
            <!-- Секція з формою -->
            <section>
                <h2>Напишіть мені</h2>
                <form action="#" method="post">
                    <!-- Група полів контактної інформації -->
                    <fieldset>
                        <legend>Контактна інформація</legend>
                        
                        <p>
                            <label for="name">Ім'я:</label>
                            <input type="text" id="name" name="user_name" placeholder="Ваше ім'я" required>
                        </p>
                        
                        <p>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="user_email" placeholder="example@mail.com" required>
                        </p>

                        <p>
                            <label for="phone">Телефон:</label>
                            <input type="tel" id="phone" name="user_phone" placeholder="+380123456789">
                        </p>

                        <p>
                            <label>Стать:</label><br>
                            <input type="radio" id="male" name="gender" value="male">
                            <label for="male">Чоловік</label><br>
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Жінка</label>
                        </p>

                        <p>
                            <label for="subject">Тема питання:</label>
                            <select id="subject" name="subject">
                                <option value="job">Пропозиція роботи</option>
                                <option value="education">Навчання</option>
                                <option value="other">Інше</option>
                            </select>
                        </p>

                        <p>
                            <label>Інтереси:</label><br>
                            <input type="checkbox" id="html" name="interests" value="html">
                            <label for="html">HTML</label><br>
                            <input type="checkbox" id="css" name="interests" value="css">
                            <label for="css">CSS</label><br>
                            <input type="checkbox" id="js" name="interests" value="js">
                            <label for="js">JavaScript</label>
                        </p>
                    </fieldset>

                    <!-- Група поля повідомлення -->
                    <fieldset>
                        <legend>Ваше повідомлення</legend>
                        <p>
                            <label for="message">Повідомлення:</label><br>
                            <textarea id="message" name="message" rows="5" cols="30"></textarea>
                        </p>
                        <button type="submit">Надіслати</button>
                        <button type="reset">Очистити</button>
                    </fieldset>
                </form>
            </section>

            <!-- Секція з контактами та мультимедіа -->
            <section>
                <h2>Мої контакти</h2>
                <!-- Зображення контактів -->
                <figure>
                    <img src="images/contact.jpg" alt="Контактне фото" width="200">
                    <figcaption>Мої контактні дані</figcaption>
                </figure>
                <!-- Аудіо привітання -->
                <section>
                    <h3>Фонова музика</h3>
                    <audio controls>
                        <source src="audio/music.mp3" type="audio/mpeg">
                        Ваш браузер не підтримує аудіо.
                    </audio>
                </section>

                <!-- Відео з моїми контактами -->
                <section>
                    <h3>Відео-привітання</h3>
                    <video controls width="400">
                        <source src="video/contacts.mp4" type="video/mp4">
                        Ваш браузер не підтримує відео.
                    </video>
                </section>
            </section>
        </article>
    </main>

    <!-- Підвал сторінки -->
    <footer>
        <p>&copy; 2026 kirussay. Всі права захищені.</p>
    </footer>
</body>
</html>
