<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Зв'яжіться зі мною через форму зворотного зв'язку">
    <meta name="author" content="kirussay">
    <title>Контакти — Портфоліо</title>
</head>
<body>
    <header>
        <h1>Зворотний зв'язок</h1>
        <nav>
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="about.html">Про мене</a></li>
                <li><a href="contacts.html">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Напишіть мені</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Контактна інформація</legend>
                    
                    <p>
                        <label for="name">Ім'я:</label>
                        <input type="text" id="name" name="user_name" placeholder="Ваше ім'я" required>
                    </p>
                    
                    <p>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="user_email" placeholder="example@mail.com" required>
                    </p>

                    <p>
                        <label for="subject">Тема питання:</label>
                        <select id="subject" name="subject">
                            <option value="job">Пропозиція роботи</option>
                            <option value="education">Навчання</option>
                            <option value="other">Інше</option>
                        </select>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Ваше повідомлення</legend>
                    <p>
                        <label for="message">Повідомлення:</label><br>
                        <textarea id="message" name="message" rows="5" cols="30"></textarea>
                    </p>
                    <button type="submit">Надіслати</button>
                    <button type="reset">Очистити</button>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 kirussay. Всі права захищені.</p>
    </footer>
</body>
</html>
